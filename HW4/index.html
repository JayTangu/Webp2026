<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>景點觀光展覽資訊</title>
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }
        td, th {
            border: 1px solid #ddd;
            padding: 6px;
        }
        tr:nth-child(even){background-color: #f2f2f2;}
        tr:hover {background-color: #ddd;}
        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D;
            color: white;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>景點觀光展覽資訊</h1>

    <div class="controls">
        <label for="searchInput">名稱搜尋：</label>
        <input type="text" id="searchInput" onchange="handleSearch()" placeholder="輸入關鍵字後按 Enter 或點擊空白處">
    </div>

    <table id="csie" class="table table-striped table-hover">
        <thead>
            <tr>
                <th>名稱</th>
                <th>地點</th>
                <th>票價</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div class="controls">
        <button onclick="prevPage()">上一頁</button>
        <span id="pageDisplay">第 1 / 1 頁</span>
        <button onclick="nextPage()">下一頁</button>
        
        <span style="margin-left: 20px;">
            跳至第 <input type="number" id="pageInput" min="1" style="width: 50px;" onchange="jumpToPage()"> 頁
        </span>
    </div>

    <script src="./script.js"></script>
</body>
</html>
